<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Odin Tic Tac Toe</title>
    <script src="scipt.js" defer></script>
</head>
<body>
    <p>This is Tic Tac Toe Game</p>
    <div class="board-container">
        <table class="line-board">
            <tr class="trow">
                <th class="tcolumn" data-value=0></th>
                <th class="tcolumn" data-value=1></th>
                <th class="tcolumn" data-value=2></th>
            </tr>
            <tr class="trow">
                <th class="tcolumn" data-value=3></th>
                <th class="tcolumn" data-value=4></th>
                <th class="tcolumn" data-value=5></th>
            </tr>
            <tr class="trow">
                <th class="tcolumn" data-value=6></th>
                <th class="tcolumn" data-value=7></th>
                <th class="tcolumn" data-value=8></th>
            </tr>
        </table>
    </div>

    <dialog class="initModal">
        <form>
            <div class="P1">
                <label for="p1_name">Player 1's Name:</label>
                <p class="player mark">X</p>
                <input type="text" id="p1_name" name="P1_name" value="jhon doe">
            </div>
            <div class="P2">
                <label for="p2_name">Player 2's Name:</label>
                <p class="player mark">O</p>
                <input type="text" id="p2_name" name="P2_name" value="jane doe">
            </div>
    
            <button type="button" id="startBtn">Let's Start</button>
        </form>
    </dialog>

    <dialog class="endModal">
        <p class="words"></p>
        <div class="score-dislpay">
            <div class="player one">
                <p>Player 1</p>
                <h2 class="Score"></h2>
            </div>
            <div class="player two">
                <p>Player 2</p>
                <h2 class="Score"></h2>
            </div>
        </div>
        <button type="button" id="restartBtn">Restart Game</button>
        <button type="button" id="againBtn">Play Again</button>
    </dialog>

</body>
</html>
