<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Odin Tic Tac Toe</title>
    <script src="scipt.js" defer></script>
</head>
<body>
    <p>This is Tic Tac Toe Game</p>
    <div class="board-container">
        <table class="line-board">
            <tr class="trow one">
                <th class="tcolumn one"></th>
                <th class="tcolumn two"></th>
                <th class="tcolumn three"></th>
            </tr>
            <tr class="trow two">
                <th class="tcolumn one"></th>
                <th class="tcolumn two"></th>
                <th class="tcolumn three"></th>
            </tr>
            <tr class="trow three">
                <th class="tcolumn one"></th>
                <th class="tcolumn two"></th>
                <th class="tcolumn three"></th>
            </tr>
        </table>
    </div>
</body>
</html>
